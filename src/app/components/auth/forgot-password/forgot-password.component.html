<div class="container">
  <div class="card shadow-lg">
    <div class="card-header">
      <h4 class="mb-0">Şifremi Unuttum</h4>
    </div>

    <div class="card-body">
      <p class="text-muted small">Kayıtlı e-posta adresinizi girin, size 6 haneli bir onay kodu gönderelim.</p>

      <form [formGroup]="forgotPasswordForm" (ngSubmit)="sendCode()">
        <div class="mb-3">
          <label for="email" class="form-label fw-bold">E-posta Adresi</label>
          <input 
            type="email" 
            id="email" 
            formControlName="email" 
            class="form-control" 
            placeholder="örnek@mail.com" 
            [class.is-invalid]="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched"
          >
          <div class="invalid-feedback">Geçerli bir e-posta adresi giriniz.</div>
        </div>

        <div class="d-grid mt-4">
          <button 
            type="submit" 
            class="btn btn-primary btn-lg" 
            [disabled]="forgotPasswordForm.invalid"
          >
            Onay Kodu Gönder
          </button>
        </div>
      </form>
    </div>

    <div class="card-footer">
      <a routerLink="/login" class="text-decoration-none small">Giriş Ekranına Dön</a>
    </div>
  </div>
</div>
