<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg border-0">
        <div class="card-header bg-success text-white text-center py-3">
          <h4 class="mb-0">Yeni Şifre Belirle</h4>
        </div>
        <div class="card-body p-4">
          <p class="text-muted text-center small mb-4">
            Lütfen mail adresinize gönderilen 6 haneli kodu ve yeni şifrenizi giriniz.
          </p>

          <form [formGroup]="resetPasswordForm" (ngSubmit)="resetPassword()">
            <div class="mb-3">
              <label class="form-label font-weight-bold">E-posta</label>
              <input type="email" formControlName="email" class="form-control bg-light" readonly>
            </div>

            <div class="mb-3">
              <label for="code" class="form-label">Onay Kodu (6 Haneli)</label>
              <input type="text" id="code" formControlName="code" class="form-control text-center letter-spacing-5"
                placeholder="000000" maxlength="6"
                [class.is-invalid]="resetPasswordForm.get('code')?.invalid && resetPasswordForm.get('code')?.touched">
              <div class="invalid-feedback">Lütfen 6 haneli kodu giriniz.</div>
            </div>

            <div class="mb-4">
              <label for="newPassword" class="form-label">Yeni Şifre</label>
              <input type="password" id="newPassword" formControlName="newPassword" class="form-control"
                placeholder="******"
                [class.is-invalid]="resetPasswordForm.get('newPassword')?.invalid && resetPasswordForm.get('newPassword')?.touched">
              <div class="invalid-feedback">Şifre en az 6 karakter olmalıdır.</div>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-success btn-block" [disabled]="resetPasswordForm.invalid">
                Şifreyi Güncelle
              </button>
              <a routerLink="/login" class="btn btn-link btn-sm text-decoration-none text-muted">Vazgeç ve Dön</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
